basePath: /api
definitions:
  controller.EditPassword:
    properties:
      password:
        type: string
    required:
    - password
    type: object
  enums.ActionRequest:
    enum:
    - save
    - submit
    type: string
    x-enum-varnames:
    - ActionSave
    - ActionSubmit
  enums.LeaveType:
    enum:
    - absence
    - annual
    - sick
    - other
    type: string
    x-enum-varnames:
    - LeaveAbsence
    - LeaveAnnual
    - LeaveSick
    - LeaveOther
  request.AuthenticateRequest:
    properties:
      password:
        maxLength: 255
        minLength: 1
        type: string
      username:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - password
    - username
    type: object
  request.CreateLeaveQuotaDetailRequest:
    properties:
      absence_quota:
        type: integer
      annual_quota:
        type: integer
      other_quota:
        type: integer
      sick_quota:
        type: integer
      status:
        maximum: 1
        minimum: 0
        type: integer
      work_year_max:
        type: number
      work_year_min:
        type: number
    required:
    - absence_quota
    - annual_quota
    - other_quota
    - sick_quota
    - status
    - work_year_max
    - work_year_min
    type: object
  request.CreateLeaveQuotaRequest:
    properties:
      leave_quota_details:
        items:
          $ref: '#/definitions/request.CreateLeaveQuotaDetailRequest'
        type: array
      status:
        maximum: 1
        minimum: 0
        type: integer
      year:
        maximum: 3000
        minimum: 2000
        type: integer
    required:
    - leave_quota_details
    - status
    - year
    type: object
  request.CreateRoleRequest:
    properties:
      child_role_ids:
        items:
          type: string
        type: array
      name:
        maxLength: 255
        minLength: 1
        type: string
      permission_ids:
        items:
          type: string
        type: array
      status:
        type: integer
    required:
    - child_role_ids
    - name
    - permission_ids
    - status
    type: object
  request.CreateUserRequest:
    properties:
      email:
        maxLength: 255
        minLength: 1
        type: string
      employed_at:
        type: string
      first_name:
        maxLength: 255
        minLength: 1
        type: string
      last_name:
        maxLength: 255
        minLength: 1
        type: string
      password:
        maxLength: 255
        minLength: 1
        type: string
      role_ids:
        items:
          type: string
        type: array
      status:
        type: integer
      username:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - email
    - employed_at
    - first_name
    - last_name
    - password
    - role_ids
    - status
    - username
    type: object
  request.CreateWorkflowDetailRequest:
    properties:
      is_final:
        maximum: 1
        minimum: 0
        type: integer
      name:
        maxLength: 255
        minLength: 1
        type: string
      role_id:
        type: string
      seq:
        type: integer
      status:
        maximum: 1
        minimum: 0
        type: integer
    required:
    - is_final
    - name
    - role_id
    - seq
    - status
    type: object
  request.CreateWorkflowRequest:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
      status:
        maximum: 1
        minimum: 0
        type: integer
      workflow_details:
        items:
          $ref: '#/definitions/request.CreateWorkflowDetailRequest'
        type: array
    required:
    - name
    - status
    - workflow_details
    type: object
  request.LeaveFormRequest:
    properties:
      action:
        allOf:
        - $ref: '#/definitions/enums.ActionRequest'
        enum:
        - save
        - submit
      end_date:
        type: string
      leave_type:
        $ref: '#/definitions/enums.LeaveType'
      reason:
        type: string
      start_date:
        type: string
      user_id:
        type: string
    required:
    - action
    - end_date
    - leave_type
    - reason
    - start_date
    type: object
  request.ReviewRequest:
    properties:
      remark:
        type: string
    type: object
  request.UpdateLeaveQuotaDetailRequest:
    properties:
      absence_quota:
        type: integer
      annual_quota:
        type: integer
      other_quota:
        type: integer
      sick_quota:
        type: integer
      status:
        maximum: 1
        minimum: 0
        type: integer
      work_year_max:
        type: number
      work_year_min:
        type: number
    required:
    - absence_quota
    - annual_quota
    - other_quota
    - sick_quota
    - status
    - work_year_max
    - work_year_min
    type: object
  request.UpdateLeaveQuotaRequest:
    properties:
      leave_quota_details:
        items:
          $ref: '#/definitions/request.UpdateLeaveQuotaDetailRequest'
        type: array
      status:
        maximum: 1
        minimum: 0
        type: integer
      year:
        maximum: 3000
        minimum: 2000
        type: integer
    required:
    - leave_quota_details
    - status
    - year
    type: object
  request.UpdateRoleRequest:
    properties:
      child_role_ids:
        items:
          type: string
        type: array
      name:
        maxLength: 255
        minLength: 1
        type: string
      permission_ids:
        items:
          type: string
        type: array
      status:
        type: integer
    required:
    - child_role_ids
    - name
    - permission_ids
    - status
    type: object
  request.UpdateSystemRequest:
    properties:
      workflow_id:
        type: string
    required:
    - workflow_id
    type: object
  request.UpdateUserRequest:
    properties:
      email:
        maxLength: 255
        minLength: 1
        type: string
      employed_at:
        type: string
      first_name:
        maxLength: 255
        minLength: 1
        type: string
      last_name:
        maxLength: 255
        minLength: 1
        type: string
      password:
        type: string
      role_ids:
        items:
          type: string
        type: array
      status:
        type: integer
      username:
        type: string
    required:
    - email
    - employed_at
    - first_name
    - last_name
    - role_ids
    - status
    type: object
  request.UpdateWorkflowDetailRequest:
    properties:
      is_final:
        maximum: 1
        minimum: 0
        type: integer
      name:
        maxLength: 255
        minLength: 1
        type: string
      role_id:
        type: string
      seq:
        type: integer
      status:
        maximum: 1
        minimum: 0
        type: integer
    required:
    - is_final
    - name
    - role_id
    - seq
    - status
    type: object
  request.UpdateWorkflowRequest:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
      status:
        maximum: 1
        minimum: 0
        type: integer
      workflow_details:
        items:
          $ref: '#/definitions/request.UpdateWorkflowDetailRequest'
        type: array
    required:
    - name
    - status
    - workflow_details
    type: object
  response.DefaultResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
