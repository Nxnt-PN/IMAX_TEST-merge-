<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .container { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; line-height: 1.6; color: #333; }
        .button-container { text-align: center; margin-top: 30px; }
        .button { background-color: #3498db; color: white !important; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; }
        .footer { background-color: #f9f9f9; color: #777; padding: 15px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Imaxx Smart Office</h2>
        </div>
        <div class="content">
            <p><strong>สวัสดี {{.Recipient}}</strong></p>
            <p>นี่คือการแจ้งเตือนจากระบบ Imaxx Smart Office :</p>
            <p style="background: #f4f4f4; padding: 15px; border-left: 4px solid #3498db;">{{.Message}}</p>
            
            <div class="button-container">
                <a href="{{.Link}}" class="button">ดูรายละเอียดรายการนี้</a>
            </div>
        </div>
        <div class="footer">
            ข้อความนี้ส่งโดยระบบอัตโนมัติ กรุณาอย่าตอบกลับ
        </div>
    </div>
</body>
</html>
